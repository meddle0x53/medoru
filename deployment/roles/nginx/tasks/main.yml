---
# Nginx setup with SSL

- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Create nginx configuration directory
  ansible.builtin.file:
    path: /etc/nginx/conf.d
    state: directory
    mode: '0755'

- name: Configure Nginx for Medoru
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/medoru
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx

- name: Enable Medoru nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/medoru
    dest: /etc/nginx/sites-enabled/medoru
    state: link
  notify: reload nginx

- name: Test nginx configuration
  ansible.builtin.command:
    cmd: nginx -t
  changed_when: false

- name: Ensure nginx is running
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: yes
