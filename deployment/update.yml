---
# Update playbook for Medoru
# Run this to deploy a new release
# Usage: ansible-playbook -i inventory/production update.yml -K

- name: Update Medoru Application
  hosts: medoru
  become: yes

  tasks:
    - name: Pull latest source code
      ansible.builtin.git:
        repo: "{{ git_repo }}"
        dest: "{{ app_home }}/source"
        version: "{{ git_branch }}"
        force: yes
      become_user: "{{ app_user }}"

    - name: Install mix dependencies
      ansible.builtin.shell: |
        source $HOME/.kiex/scripts/kiex
        kiex use 1.17.0-25
        export MIX_ENV=prod
        mix deps.get --only prod
      become_user: "{{ app_user }}"
      args:
        executable: /bin/bash
        chdir: "{{ app_home }}/source"

    - name: Compile application
      ansible.builtin.shell: |
        source $HOME/.kiex/scripts/kiex
        kiex use 1.17.0-25
        export MIX_ENV=prod
        mix compile
      become_user: "{{ app_user }}"
      args:
        executable: /bin/bash
        chdir: "{{ app_home }}/source"

    - name: Build assets
      ansible.builtin.shell: |
        source $HOME/.kiex/scripts/kiex
        kiex use 1.17.0-25
        export MIX_ENV=prod
        mix assets.deploy
      become_user: "{{ app_user }}"
      args:
        executable: /bin/bash
        chdir: "{{ app_home }}/source"

    - name: Build release
      ansible.builtin.shell: |
        source $HOME/.kiex/scripts/kiex
        kiex use 1.17.0-25
        export MIX_ENV=prod
        mix release --overwrite
      become_user: "{{ app_user }}"
      args:
        executable: /bin/bash
        chdir: "{{ app_home }}/source"

    - name: Check if current release exists
      ansible.builtin.stat:
        path: "{{ app_home }}/current"
      register: current_release_stat

    - name: Backup current release
      ansible.builtin.command:
        cmd: "cp -r {{ app_home }}/current {{ app_home }}/current.backup.{{ ansible_date_time.epoch }}"
      when: current_release_stat.stat.exists
      ignore_errors: yes

    - name: Stop medoru service
      ansible.builtin.systemd:
        name: medoru
        state: stopped

    - name: Remove old current release
      ansible.builtin.file:
        path: "{{ app_home }}/current"
        state: absent

    - name: Deploy release to current
      ansible.builtin.copy:
        src: "{{ app_home }}/source/_build/prod/rel/medoru"
        dest: "{{ app_home }}/current"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0755'
        remote_src: yes

    - name: Create tmp directory
      ansible.builtin.file:
        path: "{{ app_home }}/current/tmp"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0755'

    - name: Fix permissions on env file
      ansible.builtin.file:
        path: /etc/medoru/medoru.env
        group: "{{ app_group }}"
        mode: '0640'

    - name: Run database migrations
      ansible.builtin.shell: |
        export $(cat /etc/medoru/medoru.env | xargs)
        {{ app_home }}/current/bin/medoru eval "Medoru.Release.migrate()"
      become_user: "{{ app_user }}"
      register: migration_result
      changed_when: true
      ignore_errors: yes
      timeout: 300

    - name: Display migration output
      ansible.builtin.debug:
        msg: "Migration result: {{ migration_result.stdout | default('No output') }}"

    - name: Start medoru service
      ansible.builtin.systemd:
        name: medoru
        state: started
        enabled: yes

    - name: Wait for application to be ready
      ansible.builtin.uri:
        url: http://127.0.0.1:4000/
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 15
      delay: 3
      ignore_errors: yes

    - name: Display deployment status
      ansible.builtin.debug:
        msg:
          - "=== Update Complete ==="
          - ""
          - "Application URL: https://medoru.net"
          - "Health check: {{ 'PASSED' if health_check.status == 200 else 'FAILED - check logs' }}"
          - ""
          - "View logs: sudo journalctl -u medoru -f"
