# Logrotate configuration for Medoru
# Install to /etc/logrotate.d/medoru
#
# Installation:
#   sudo cp logrotate.conf /etc/logrotate.d/medoru
#   sudo chmod 644 /etc/logrotate.d/medoru

/var/log/medoru/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 medoru medoru
    sharedscripts
    postrotate
        # Send HUP signal to reopen log files (if supported)
        # Or restart the application
        systemctl reload medoru 2>/dev/null || true
    endscript
}
